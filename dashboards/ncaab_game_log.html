<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAAB Game Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f1419;
  --bg-secondary: #161d27;
  --bg-card: #1a2332;
  --bg-hover: #1e2a3a;
  --border: #243040;
  --text-primary: #e8edf4;
  --text-secondary: #8899ad;
  --text-muted: #5a6b7f;
  --accent: #4da6ff;
  --accent-dim: rgba(77,166,255,0.15);
  --green: #34d399;
  --red: #ef4444;
  --yellow: #f59e0b;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}
body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); font-size: 14px; line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* HEADER */
.header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }
.header h1 span { color: var(--accent); }
.header-nav { margin-left: auto; font-size: 13px; }

/* SUMMARY BAR */
.stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 16px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; text-align: center; }
.stat-card .stat-value { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
.stat-card .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

/* CONTROLS */
.controls { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.control-input { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--text-primary); font-size: 13px; outline: none; }
.control-input:focus { border-color: var(--accent); }
.control-input::placeholder { color: var(--text-muted); }
input[type="date"].control-input { width: 150px; color-scheme: dark; }
select.control-input { cursor: pointer; }
.search-box { width: 220px; }
.control-label { font-size: 12px; color: var(--text-secondary); margin-right: -4px; }
.row-count { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

/* TABLE */
.content { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }
.data-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; max-height: 75vh; overflow-y: auto; }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data-table th {
  background: var(--bg-card); color: var(--text-secondary); font-weight: 600;
  text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
  padding: 8px 10px; text-align: left; cursor: pointer; white-space: nowrap;
  position: sticky; top: 0; z-index: 1; user-select: none;
  border-bottom: 1px solid var(--border);
}
table.data-table th:hover { color: var(--accent); }
table.data-table th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.4; }
table.data-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
table.data-table td { padding: 6px 10px; border-bottom: 1px solid rgba(36,48,64,0.4); white-space: nowrap; }
table.data-table tr:hover td { background: var(--bg-hover); }
table.data-table tr.bet-row { border-left: 3px solid var(--green); }
table.data-table tr.bet-row td:first-child { padding-left: 7px; }

.result-home { color: var(--green); font-weight: 600; }
.result-away { color: var(--red); font-weight: 600; }
.check { color: var(--green); font-weight: 700; }
.null-val { color: var(--text-muted); }
.mono { font-family: var(--mono); font-size: 12px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
  .controls { flex-direction: column; align-items: stretch; }
  .row-count { margin-left: 0; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>NCAAB <span>Game Log</span></h1>
  <div class="header-nav">
    <a href="ncaab_dashboard.html">&larr; Back to Dashboard</a>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-value" id="stat-total">--</div>
    <div class="stat-label">Total Games</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-bets">--</div>
    <div class="stat-label">Games with Bets</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-settled">--</div>
    <div class="stat-label">Settled</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-opening">--</div>
    <div class="stat-label">With Opening Odds</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="stat-closing">--</div>
    <div class="stat-label">With Closing Odds</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <span class="control-label">From</span>
  <input type="date" id="filter-from" class="control-input">
  <span class="control-label">To</span>
  <input type="date" id="filter-to" class="control-input">
  <select id="filter-bet" class="control-input">
    <option value="all">All Games</option>
    <option value="bet">Bet Only</option>
    <option value="nobet">No Bet</option>
  </select>
  <input type="text" id="filter-search" class="control-input search-box" placeholder="Search team name...">
  <span class="row-count" id="row-count"></span>
</div>

<!-- TABLE -->
<div class="content">
  <div class="data-table-wrap">
    <table class="data-table" id="game-table">
      <thead>
        <tr>
          <th data-col="game_date">Date <span class="sort-arrow">&#9650;</span></th>
          <th data-col="home">Home <span class="sort-arrow">&#9650;</span></th>
          <th data-col="away">Away <span class="sort-arrow">&#9650;</span></th>
          <th data-col="score">Score <span class="sort-arrow">&#9650;</span></th>
          <th data-col="result">Result <span class="sort-arrow">&#9650;</span></th>
          <th data-col="model_prob_home">Model Prob <span class="sort-arrow">&#9650;</span></th>
          <th data-col="edge">Edge <span class="sort-arrow">&#9650;</span></th>
          <th data-col="odds_opening_home">Opening (H/A) <span class="sort-arrow">&#9650;</span></th>
          <th data-col="odds_closing_home">Closing (H/A) <span class="sort-arrow">&#9650;</span></th>
          <th data-col="bet_placed">Bet? <span class="sort-arrow">&#9650;</span></th>
          <th data-col="bet_side">Bet Side <span class="sort-arrow">&#9650;</span></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
(function() {
  let allGames = [];
  let sortCol = 'game_date';
  let sortAsc = false; // newest first by default

  // Formatting helpers
  function fmtOdds(v) {
    if (v == null) return '<span class="null-val">&mdash;</span>';
    return v > 0 ? '+' + v : '' + v;
  }

  function fmtPct(v) {
    if (v == null) return '<span class="null-val">&mdash;</span>';
    return (v * 100).toFixed(1) + '%';
  }

  function fmtPctRaw(v) {
    // edge is already a fraction (e.g., 0.15 = 15%)
    if (v == null) return '<span class="null-val">&mdash;</span>';
    return (v * 100).toFixed(1) + '%';
  }

  function fmtNull(v) {
    if (v == null || v === '') return '<span class="null-val">&mdash;</span>';
    return v;
  }

  function getVal(row, col) {
    switch (col) {
      case 'score':
        if (row.home_score == null) return -Infinity;
        return row.home_score * 1000 + row.away_score;
      case 'odds_opening_home':
        return row.odds_opening_home || 0;
      case 'odds_closing_home':
        return row.odds_closing_home || 0;
      default:
        return row[col] != null ? row[col] : '';
    }
  }

  function renderRow(g) {
    const isBet = g.bet_placed === 1;
    const cls = isBet ? 'bet-row' : '';

    let scoreCell;
    if (g.home_score != null && g.away_score != null) {
      scoreCell = `<span class="mono">${g.home_score} - ${g.away_score}</span>`;
    } else {
      scoreCell = '<span class="null-val">&mdash;</span>';
    }

    let resultCell;
    if (g.result === 'home') {
      resultCell = '<span class="result-home">Home</span>';
    } else if (g.result === 'away') {
      resultCell = '<span class="result-away">Away</span>';
    } else {
      resultCell = '<span class="null-val">&mdash;</span>';
    }

    const openH = fmtOdds(g.odds_opening_home);
    const openA = fmtOdds(g.odds_opening_away);
    const closeH = fmtOdds(g.odds_closing_home);
    const closeA = fmtOdds(g.odds_closing_away);

    const openingCell = g.odds_opening_home != null
      ? `<span class="mono">${openH} / ${openA}</span>`
      : '<span class="null-val">&mdash;</span>';
    const closingCell = g.odds_closing_home != null
      ? `<span class="mono">${closeH} / ${closeA}</span>`
      : '<span class="null-val">&mdash;</span>';

    const betCheck = isBet ? '<span class="check">&#10003;</span>' : '';
    const betSide = isBet ? fmtNull(g.bet_side) : '';

    return `<tr class="${cls}">
      <td class="mono">${g.game_date || ''}</td>
      <td>${g.home || ''}</td>
      <td>${g.away || ''}</td>
      <td>${scoreCell}</td>
      <td>${resultCell}</td>
      <td class="mono">${fmtPct(g.model_prob_home)}</td>
      <td class="mono">${fmtPctRaw(g.edge)}</td>
      <td>${openingCell}</td>
      <td>${closingCell}</td>
      <td style="text-align:center">${betCheck}</td>
      <td>${betSide}</td>
    </tr>`;
  }

  function applyFilters() {
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    const betFilter = document.getElementById('filter-bet').value;
    const search = document.getElementById('filter-search').value.toLowerCase().trim();

    let filtered = allGames.filter(function(g) {
      if (from && g.game_date < from) return false;
      if (to && g.game_date > to) return false;
      if (betFilter === 'bet' && g.bet_placed !== 1) return false;
      if (betFilter === 'nobet' && g.bet_placed === 1) return false;
      if (search) {
        const home = (g.home || '').toLowerCase();
        const away = (g.away || '').toLowerCase();
        if (!home.includes(search) && !away.includes(search)) return false;
      }
      return true;
    });

    // Sort
    filtered.sort(function(a, b) {
      let va = getVal(a, sortCol);
      let vb = getVal(b, sortCol);
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });

    // Render
    document.getElementById('table-body').innerHTML = filtered.map(renderRow).join('');
    document.getElementById('row-count').textContent = filtered.length + ' of ' + allGames.length + ' games';

    // Update summary from filtered set
    updateSummary(filtered);
  }

  function updateSummary(games) {
    document.getElementById('stat-total').textContent = games.length;
    document.getElementById('stat-bets').textContent = games.filter(function(g) { return g.bet_placed === 1; }).length;
    document.getElementById('stat-settled').textContent = games.filter(function(g) { return g.result != null; }).length;
    document.getElementById('stat-opening').textContent = games.filter(function(g) { return g.odds_opening_home != null; }).length;
    document.getElementById('stat-closing').textContent = games.filter(function(g) { return g.odds_closing_home != null; }).length;
  }

  // Column sort click handler
  document.querySelectorAll('#game-table th[data-col]').forEach(function(th) {
    th.addEventListener('click', function() {
      const col = th.getAttribute('data-col');
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      // Update sort arrow indicators
      document.querySelectorAll('#game-table th').forEach(function(h) { h.classList.remove('sorted'); });
      th.classList.add('sorted');
      th.querySelector('.sort-arrow').innerHTML = sortAsc ? '&#9650;' : '&#9660;';
      applyFilters();
    });
  });

  // Filter event listeners
  document.getElementById('filter-from').addEventListener('change', applyFilters);
  document.getElementById('filter-to').addEventListener('change', applyFilters);
  document.getElementById('filter-bet').addEventListener('change', applyFilters);
  document.getElementById('filter-search').addEventListener('input', applyFilters);

  // Load data
  fetch('../data/processed/ncaab_dashboard_bundle.json')
    .then(function(r) {
      if (!r.ok) throw new Error('Failed to load data: ' + r.status);
      return r.json();
    })
    .then(function(data) {
      allGames = data.game_log || [];
      // Set default sort: newest first
      sortCol = 'game_date';
      sortAsc = false;
      // Set initial sort indicator
      var dateTh = document.querySelector('th[data-col="game_date"]');
      if (dateTh) {
        dateTh.classList.add('sorted');
        dateTh.querySelector('.sort-arrow').innerHTML = '&#9660;';
      }
      applyFilters();
    })
    .catch(function(err) {
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text-muted)">' +
        'Failed to load game log data. Run <code>python scripts/generate_dashboard_data.py</code> first.<br>' +
        '<small>' + err.message + '</small></td></tr>';
    });
})();
</script>
</body>
</html>
