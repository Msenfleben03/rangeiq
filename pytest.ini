# pytest.ini - Pytest Configuration

[pytest]
# Minimum pytest version
minversion = 7.0

# Test discovery paths
testpaths = tests

# Python file patterns
python_files = test_*.py *_test.py

# Python function patterns
python_functions = test_*

# Python class patterns
python_classes = Test*

# Add options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Stop after first failure (comment out for full run)
    # -x
    # Show slowest 10 tests
    --durations=10
    # Coverage (uncomment when coverage is set up)
    # --cov=models --cov=betting --cov=tracking
    # --cov-report=term-missing
    # --cov-report=html:reports/coverage
    # Warnings
    -W ignore::DeprecationWarning

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external APIs
    database: marks tests requiring database
    model: marks model-specific tests
    betting: marks betting logic tests
    data: marks data pipeline tests

# Ignore certain directories
norecursedirs =
    .git
    .tox
    .env
    venv
    data
    notebooks
    __pycache__
    *.egg-info

# Logging configuration for tests
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test timeout (requires pytest-timeout)
# timeout = 300

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
